<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
</head>
<body class="bg-gray-500 flex justify-center">
    <div class="calculator p-5 bg-gray-200 w-80 mx-auto rounded-xl shadow-lg">
        <input type="text" id="display" disabled placeholder="0"  
        class="w-full h-14 border border-black bg-gray-300 text-right text-2xl text-blue-500 px-3
        font-poppins disabled:bg-gray-300 disabled:text-blue-500 rounded-md mb-4">
        <div class="grid grid-cols-4 gap-2">
            <button class="bg-white text-black font-poppins py-3 rounded shadow hover:bg-gray-100">7</button>
            <button class="bg-white text-black font-poppins py-3 rounded shadow hover:bg-gray-100">8</button>
            <button class="bg-white text-black font-poppins py-3 rounded shadow hover:bg-gray-100">9</button>
            <button class="bg-orange-400 text-white font-poppins py-3 rounded shadow hover:bg-orange-500">/</button>

            <button class="bg-white text-black font-poppins py-3 rounded shadow hover:bg-gray-100">4</button>
            <button class="bg-white text-black font-poppins py-3 rounded shadow hover:bg-gray-100">5</button>
            <button class="bg-white text-black font-poppins py-3 rounded shadow hover:bg-gray-100">6</button>
            <button class="bg-orange-400 text-white font-poppins py-3 rounded shadow hover:bg-orange-500">*</button>

            <button class="bg-white text-black font-poppins py-3 rounded shadow hover:bg-gray-100">1</button>
            <button class="bg-white text-black font-poppins py-3 rounded shadow hover:bg-gray-100">2</button>
            <button class="bg-white text-black font-poppins py-3 rounded shadow hover:bg-gray-100">3</button>
            <button class="bg-orange-400 text-white font-poppins py-3 rounded shadow hover:bg-orange-500">-</button>

            <button class="bg-white text-black font-poppins py-3 rounded shadow hover:bg-gray-100">0</button>
            <button id="clear" class="bg-red-500 text-white font-poppins py-3 rounded shadow hover:bg-red-600">C</button>
            <button id="equals" class="bg-green-500 text-white font-poppins py-3 rounded shadow hover:bg-green-600">=</button>
            <button class="bg-orange-400 text-white font-poppins py-3 rounded shadow hover:bg-orange-500">+</button>
        </div>
    </div>
    <script src="script.js"></script>
    <script src="tailwind.config.js"></script>
</body>
</html>
